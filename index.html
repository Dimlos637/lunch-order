<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>造型中餐點餐系統</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --main-green: #556b2f; --bg-color: #f4f7f4; --accent-brown: #8b4513; }
        body { background-color: var(--bg-color); padding: 15px; font-family: "Microsoft JhengHei", sans-serif; font-size: 16px; }
        .order-card { 
            background: white; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); 
            padding: 25px; max-width: 500px; margin: auto; border-top: 10px solid var(--main-green);
            position: relative; transition: all 0.3s ease;
        }
        .btn-submit { background-color: var(--main-green) !important; color: white !important; width: 100%; border-radius: 30px; border: none !important; padding: 12px; font-weight: bold; margin-top: 20px; }
        .btn-withdraw { background-color: transparent; color: #666; width: 100%; border-radius: 30px; padding: 8px; font-size: 0.9rem; border: 1px solid #ccc; margin-top: 12px; }
        .price-tag { color: var(--main-green); font-weight: 900; font-size: 1.5rem; }
        #paymentSection { background-color: #f8faf8; border-left: 5px solid var(--main-green); display: none; padding: 15px; border-radius: 10px; margin-top: 15px; }
        .promo-badge { background-color: #fff9db; border: 1px dashed #fab005; padding: 10px; border-radius: 10px; font-size: 0.85rem; color: #856404; margin-bottom: 20px; }
        .warning-text { color: #d9534f; font-weight: bold; font-size: 0.85rem; display: none; margin-top: 5px; }
        .form-label { font-weight: bold; color: #444; }
    </style>
</head>
<body>

<div class="container">
    <div id="loading" class="text-center py-5">
        <div class="spinner-border text-success"></div>
        <p class="mt-2 text-secondary">正在連線至中餐系統...</p>
    </div>

    <div id="formSection" class="order-card" style="display:none;">
        <h3 class="text-center mb-1" id="resTitle" style="color: var(--main-green); font-weight: 900;">今日店家</h3>
        <p class="text-center text-secondary small mb-3">造型中餐點餐系統</p>
        
        <div class="promo-badge text-center">
            <strong>💡 溫馨提醒：</strong> 重新下單將自動覆蓋舊紀錄。
        </div>

        <form id="orderForm">
            <div class="mb-3">
                <label class="form-label">您的姓名</label>
                <input type="text" id="userName" class="form-control" placeholder="請輸入姓名" required>
            </div>
            
            <div class="mb-3">
                <label class="form-label">選擇品項</label>
                <select id="menuSelect" class="form-select" required></select>
            </div>

            <div class="mb-3">
                <label class="form-label">數量</label>
                <input type="number" id="qtyInput" class="form-control" value="1" min="1" required>
                <div id="priceDisplay" class="mt-2 text-end"></div>
                <div id="qtyWarning" class="warning-text text-end">⚠️ 單價含 0.5 元，請點選「雙數」以免主揪難找錢</div>
            </div>

            <div class="mb-3">
                <label class="form-label">備註</label>
                <input type="text" id="note" class="form-control" placeholder="例如：半飯...">
            </div>

            <div class="mb-3 form-check">
                <input type="checkbox" class="form-check-input" id="paidCheck">
                <label class="form-check-label fw-bold" for="paidCheck" style="color: var(--main-green);"> 我已現場繳費 </label>
            </div>

            <div id="paymentSection">
                <label class="form-label small">收取金額 (面額)</label>
                <input type="number" id="receivedAmt" class="form-control mb-2" placeholder="例如：100, 500">
                <div class="fw-bold text-end" style="color: var(--accent-brown);">預計找零：<span id="changeAmt">$0</span></div>
            </div>

            <button type="submit" id="submitBtn" class="btn btn-submit">確認送出訂單</button>
            <button type="button" id="withdrawBtn" class="btn btn-withdraw">🔙 撤回我的最後一筆訂單</button>
        </form>
    </div>

    <div id="closedSection" class="order-card text-center py-5" style="display:none;">
        <h2 style="color: var(--main-green); font-weight: bold;">🛑 點餐已截止</h2>
        <p class="text-secondary mt-3">今日的點餐時間已結束。<br>如有急需請直接聯繫主揪。</p>
        <hr>
        <p class="small text-muted">服務時間：週一至週五 07:00 - 08:45</p>
    </div>
</div>

<script>
    const CONFIG = {
        GAS_API: "https://script.google.com/macros/s/AKfycbyueRiA8FDP84WutZ3XtQ-XyGbusGo4WFgV1Qwa0IqEOsSA3Uky44r9otrA30rqDJ7iYA/exec"
    };

    let menuStore = [], currentUnitPrice = 0;

    window.onload = () => {
        fetch(CONFIG.GAS_API)
            .then(res => res.json())
            .then(data => {
                document.getElementById('loading').style.display = 'none';
                if (data.status !== "開啟") { 
                    document.getElementById('closedSection').style.display = 'block'; 
                    return; 
                }
                document.getElementById('formSection').style.display = 'block';
                document.getElementById('resTitle').innerText = "🍱 今日餐廳：" + (data.restaurant || "點餐系統");
                
                menuStore = data.menu;
                const menuSel = document.getElementById('menuSelect');
                menuSel.add(new Option("-- 請選擇品項 --", ""));
                data.menu.forEach((row, idx) => {
                    if(row[0]) {
                        let opt = new Option(`${row[0]} ($${row[1]})`, row[0]);
                        opt.dataset.price = row[1];
                        menuSel.add(opt);
                    }
                });
            })
            .catch(() => {
                document.getElementById('loading').innerHTML = '<p class="text-danger">系統連線失敗。請確認 GAS 部署網址是否正確並設為「所有人」存取。</p>';
            });
    };

    function updateUI() {
        const qty = parseInt(document.getElementById('qtyInput').value) || 1;
        const total = currentUnitPrice * qty;
        
        const warning = document.getElementById('qtyWarning');
        if (currentUnitPrice % 1 !== 0 && qty % 2 !== 0) {
            warning.style.display = 'block';
        } else {
            warning.style.display = 'none';
        }

        document.getElementById('priceDisplay').innerHTML = currentUnitPrice > 0 ? `總計 <span class="price-tag">$${total}</span>` : "";
        
        const received = parseFloat(document.getElementById('receivedAmt').value) || 0;
        document.getElementById('changeAmt').innerText = `$${Math.max(0, received - total)}`;
        
        document.getElementById('paymentSection').style.display = document.getElementById('paidCheck').checked ? 'block' : 'none';
    }

    document.getElementById('menuSelect').onchange = function() {
        const selectedOpt = this.selectedOptions[0];
        currentUnitPrice = selectedOpt ? parseFloat(selectedOpt.dataset.price) : 0;
        updateUI();
    };

    document.getElementById('qtyInput').oninput = updateUI;
    document.getElementById('receivedAmt').oninput = updateUI;
    document.getElementById('paidCheck').onchange = updateUI;

    document.getElementById('orderForm').onsubmit = function(e) {
        e.preventDefault();
        const qty = parseInt(document.getElementById('qtyInput').value);
        
        if (currentUnitPrice % 1 !== 0 && qty % 2 !== 0) {
            alert("⚠️ 此品項包含 0.5 元，請點選「雙數」數量。");
            return;
        }

        const btn = document.getElementById('submitBtn');
        btn.disabled = true; btn.innerText = "傳送中...";

        fetch(CONFIG.GAS_API, {
            method: 'POST',
            body: JSON.stringify({
                userName: document.getElementById('userName').value,
                item: document.getElementById('menuSelect').value,
                price: currentUnitPrice,
                quantity: qty,
                note: document.getElementById('note').value,
                hasPaid: document.getElementById('paidCheck').checked,
                receivedAmount: document.getElementById('receivedAmt').value
            })
        })
        .then(res => res.json())
        .then(res => {
            alert(res.result);
            if (res.result.includes("成功")) {
                this.reset();
                currentUnitPrice = 0;
                updateUI();
            }
            btn.disabled = false; btn.innerText = "確認送出訂單";
        });
    };

    document.getElementById('withdrawBtn').onclick = function() {
        const name = document.getElementById('userName').value.trim();
        if (!name) { alert("請輸入姓名以執行撤回。"); return; }
        if (!confirm("確定要撤回您的最後一筆訂單嗎？")) return;

        fetch(CONFIG.GAS_API, {
            method: 'POST',
            body: JSON.stringify({ action: "delete", userName: name })
        })
        .then(res => res.json())
        .then(res => alert(res.result));
    };
</script>
</body>
</html>
